name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: uclub
          POSTGRES_PASSWORD: uclub
          POSTGRES_DB: uclub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://uclub:uclub@localhost:5432/uclub

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @u-club/api typecheck

      - name: Lint
        run: pnpm --filter @u-club/api lint

      - name: Format
        run: pnpm --filter @u-club/api format:check

      - name: Test
        run: pnpm --filter @u-club/api test

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: uclub
          POSTGRES_PASSWORD: uclub
          POSTGRES_DB: uclub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mailpit:
        image: axllent/mailpit
        ports:
          - 1025:1025
          - 8025:8025

    env:
      DATABASE_URL: postgres://uclub:uclub@localhost:5432/uclub
      JWT_SECRET: ci-test-secret
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: test@uclub.dev
      API_PORT: 4000

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @u-club/api migrate

      - run: pnpm --filter @u-club/e2e exec playwright install chromium

      - name: Start API
        run: pnpm dev:api &

      - name: Start PWA
        run: pnpm dev:pwa &

      - name: Wait for servers
        run: npx wait-on http://localhost:4000/health http://localhost:5173 --timeout 30000

      - name: Run e2e tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/e2e/test-results/
          retention-days: 7
